{% extends "base.html" %}
{% block content %}
<section class="card">
    <h2>Evaluar proyecto: {{ project.title }}</h2>
    <p>Tipo de evaluacion: <strong>{{ eval_type_name }}</strong></p>
    <form method="post" class="form-grid">
        {% for criterion in criteria %}
            <label>{{ criterion.name }} ({{ criterion.min_score }}-{{ criterion.max_score }})
                <input
                    type="number"
                    name="criterion_{{ criterion.id }}"
                    min="{{ criterion.min_score }}"
                    max="{{ criterion.max_score }}"
                    required
                >
            </label>
        {% endfor %}
        <label>Comentarios
            <textarea name="comments" rows="4"></textarea>
        </label>
        <button type="submit">Guardar evaluacion</button>
    </form>
</section>
{% endblock %}
