{% extends "base.html" %}
{% block content %}
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="admin-sidebar-top">
            <h2>Admin Hub</h2>
            <p>ExpoTécnica</p>
        </div>
        <nav class="admin-menu">
            {% for group in admin_menu_groups %}
                <p class="admin-menu-group">{{ group["label"] }}</p>
                {% for item in group["items"] %}
                    <a href="{{ url_for(item.endpoint) }}" class="{% if active_page == item.key %}active{% endif %}">
                        <svg class="admin-menu-icon" aria-hidden="true" focusable="false"><use href="#ico-{{ item.icon }}"></use></svg>
                        <span>{{ item.label }}</span>
                    </a>
                {% endfor %}
            {% endfor %}
        </nav>
    </aside>

    <div class="admin-main">
        {% block admin_content %}{% endblock %}
    </div>
</div>
<script>
    (function () {
        function openDialog(dialogId) {
            const dialog = document.getElementById(dialogId);
            if (!dialog || typeof dialog.showModal !== "function") {
                return;
            }

            const parentId = dialog.dataset.parentDialog;
            if (parentId) {
                openDialog(parentId);
            }

            if (!dialog.open) {
                dialog.showModal();
            }
        }

        function updateHash(dialogId) {
            const targetUrl = dialogId
                ? `${window.location.pathname}${window.location.search}#${dialogId}`
                : `${window.location.pathname}${window.location.search}`;
            history.replaceState(null, "", targetUrl);
        }

        function syncDialogFromHash() {
            const dialogId = window.location.hash ? window.location.hash.slice(1) : "";
            if (dialogId) {
                openDialog(dialogId);
            }
        }

        document.addEventListener("click", function (event) {
            const openBtn = event.target.closest("[data-dialog-open]");
            if (openBtn) {
                const dialogId = openBtn.dataset.dialogOpen;
                openDialog(dialogId);
                updateHash(dialogId);
                return;
            }

            const closeBtn = event.target.closest("[data-dialog-close]");
            if (closeBtn) {
                const dialog = closeBtn.closest("dialog");
                if (dialog) {
                    dialog.close();
                    updateHash(dialog.dataset.parentDialog || "");
                }
                return;
            }
        });

        window.addEventListener("hashchange", syncDialogFromHash);
        syncDialogFromHash();
    })();
</script>
{% endblock %}
