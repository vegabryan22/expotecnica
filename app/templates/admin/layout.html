{% extends "base.html" %}
{% block content %}
<div class="admin-shell">
    <aside class="admin-sidebar">
        <div class="admin-sidebar-top">
            <h2>Admin Hub</h2>
            <p>ExpoTécnica</p>
        </div>
        <nav class="admin-menu">
            <a href="{{ url_for('admin.overview') }}" class="{% if active_page == 'overview' %}active{% endif %}">Resumen</a>
            <a href="{{ url_for('admin.assignments_page') }}" class="{% if active_page == 'assignments' %}active{% endif %}">Asignaciones</a>
            <a href="{{ url_for('admin.judges_page') }}" class="{% if active_page == 'judges' %}active{% endif %}">Jueces</a>
            <a href="{{ url_for('admin.campaigns_page') }}" class="{% if active_page == 'campaigns' %}active{% endif %}">Campañas</a>
            <a href="{{ url_for('admin.categories_page') }}" class="{% if active_page == 'categories' %}active{% endif %}">Categorías</a>
            <a href="{{ url_for('admin.academic_page') }}" class="{% if active_page == 'academic' %}active{% endif %}">Académico</a>
            <a href="{{ url_for('admin.rubrics_page') }}" class="{% if active_page == 'rubrics' %}active{% endif %}">Rúbricas</a>
            <a href="{{ url_for('admin.projects_page') }}" class="{% if active_page == 'projects' %}active{% endif %}">Proyectos</a>
            <a href="{{ url_for('admin.evaluations_page') }}" class="{% if active_page == 'evaluations' %}active{% endif %}">Evaluaciones</a>
            <a href="{{ url_for('admin.smtp_page') }}" class="{% if active_page == 'smtp' %}active{% endif %}">SMTP</a>
            <a href="{{ url_for('admin.institution_page') }}" class="{% if active_page == 'institution' %}active{% endif %}">Institución</a>
            <a href="{{ url_for('admin.maintenance_page') }}" class="{% if active_page == 'maintenance' %}active{% endif %}">Mantenimiento</a>
            <a href="{{ url_for('admin.logs_page') }}" class="{% if active_page == 'logs' %}active{% endif %}">Bitácora</a>
        </nav>
    </aside>

    <div class="admin-main">
        {% block admin_content %}{% endblock %}
    </div>
</div>
<script>
    (function () {
        function openDialog(dialogId) {
            const dialog = document.getElementById(dialogId);
            if (!dialog || typeof dialog.showModal !== "function") {
                return;
            }

            const parentId = dialog.dataset.parentDialog;
            if (parentId) {
                openDialog(parentId);
            }

            if (!dialog.open) {
                dialog.showModal();
            }
        }

        function updateHash(dialogId) {
            const targetUrl = dialogId
                ? `${window.location.pathname}${window.location.search}#${dialogId}`
                : `${window.location.pathname}${window.location.search}`;
            history.replaceState(null, "", targetUrl);
        }

        function syncDialogFromHash() {
            const dialogId = window.location.hash ? window.location.hash.slice(1) : "";
            if (dialogId) {
                openDialog(dialogId);
            }
        }

        document.addEventListener("click", function (event) {
            const openBtn = event.target.closest("[data-dialog-open]");
            if (openBtn) {
                const dialogId = openBtn.dataset.dialogOpen;
                openDialog(dialogId);
                updateHash(dialogId);
                return;
            }

            const closeBtn = event.target.closest("[data-dialog-close]");
            if (closeBtn) {
                const dialog = closeBtn.closest("dialog");
                if (dialog) {
                    dialog.close();
                    updateHash(dialog.dataset.parentDialog || "");
                }
                return;
            }
        });

        window.addEventListener("hashchange", syncDialogFromHash);
        syncDialogFromHash();
    })();
</script>
{% endblock %}
