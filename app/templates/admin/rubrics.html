{% extends "admin/layout.html" %}
{% block admin_content %}
<section class="card admin-section">
    <div class="section-head">
        <h3>Tipos de evaluacion y rubricas</h3>
        <p>Configura la estructura de evaluacion y sus puntajes.</p>
    </div>
    <form method="post" action="{{ action_url }}" class="form-grid inline-grid-4">
        <input type="hidden" name="next" value="{{ next_url }}">
        <input type="hidden" name="action" value="create_evaluation_type">
        <label>Codigo tipo
            <input type="text" name="eval_type_code" required>
        </label>
        <label>Nombre tipo
            <input type="text" name="eval_type_name" required>
        </label>
        <label>Orden
            <input type="number" name="eval_type_sort_order" value="0" required>
        </label>
        <button type="submit">Crear tipo</button>
    </form>

    {% for eval_type in evaluation_types %}
        <div class="inline-card">
            <form method="post" action="{{ action_url }}" class="form-grid inline-grid-6">
                <input type="hidden" name="next" value="{{ next_url }}">
                <input type="hidden" name="action" value="update_evaluation_type">
                <input type="hidden" name="eval_type_id" value="{{ eval_type.id }}">
                <label>Codigo
                    <input type="text" name="eval_type_code" value="{{ eval_type.code }}" required>
                </label>
                <label>Nombre
                    <input type="text" name="eval_type_name" value="{{ eval_type.name }}" required>
                </label>
                <label>Orden
                    <input type="number" name="eval_type_sort_order" value="{{ eval_type.sort_order }}" required>
                </label>
                <label>Activo
                    <select name="eval_type_is_active">
                        <option value="1" {% if eval_type.is_active %}selected{% endif %}>Si</option>
                        <option value="0" {% if not eval_type.is_active %}selected{% endif %}>No</option>
                    </select>
                </label>
                <button type="submit">Guardar tipo</button>
            </form>
            <form method="post" action="{{ action_url }}" class="inline-form">
                <input type="hidden" name="next" value="{{ next_url }}"><input type="hidden" name="action" value="delete_evaluation_type"><input type="hidden" name="eval_type_id" value="{{ eval_type.id }}"><button type="submit" class="danger-btn">Eliminar tipo</button>
            </form>

            <form method="post" action="{{ action_url }}" class="form-grid inline-grid-6">
                <input type="hidden" name="next" value="{{ next_url }}">
                <input type="hidden" name="action" value="create_rubric">
                <input type="hidden" name="rubric_evaluation_type_id" value="{{ eval_type.id }}">
                <label>Rubrica
                    <input type="text" name="rubric_name" required>
                </label>
                <label>Min
                    <input type="number" name="rubric_min_score" value="1" required>
                </label>
                <label>Max
                    <input type="number" name="rubric_max_score" value="25" required>
                </label>
                <label>Orden
                    <input type="number" name="rubric_sort_order" value="0" required>
                </label>
                <button type="submit">Agregar rubrica</button>
            </form>

            {% for rubric in eval_type.rubric_criteria %}
                <div class="inline-card">
                    <form method="post" action="{{ action_url }}" class="form-grid inline-grid-7">
                        <input type="hidden" name="next" value="{{ next_url }}">
                        <input type="hidden" name="action" value="update_rubric">
                        <input type="hidden" name="rubric_id" value="{{ rubric.id }}">
                        <label>Nombre
                            <input type="text" name="rubric_name" value="{{ rubric.name }}" required>
                        </label>
                        <label>Min
                            <input type="number" name="rubric_min_score" value="{{ rubric.min_score }}" required>
                        </label>
                        <label>Max
                            <input type="number" name="rubric_max_score" value="{{ rubric.max_score }}" required>
                        </label>
                        <label>Orden
                            <input type="number" name="rubric_sort_order" value="{{ rubric.sort_order }}" required>
                        </label>
                        <label>Activo
                            <select name="rubric_is_active">
                                <option value="1" {% if rubric.is_active %}selected{% endif %}>Si</option>
                                <option value="0" {% if not rubric.is_active %}selected{% endif %}>No</option>
                            </select>
                        </label>
                        <button type="submit">Guardar rubrica</button>
                    </form>
                    <form method="post" action="{{ action_url }}" class="inline-form">
                        <input type="hidden" name="next" value="{{ next_url }}"><input type="hidden" name="action" value="delete_rubric"><input type="hidden" name="rubric_id" value="{{ rubric.id }}"><button type="submit" class="danger-btn">Eliminar rubrica</button>
                    </form>
                </div>
            {% endfor %}
        </div>
    {% endfor %}
</section>
{% endblock %}
