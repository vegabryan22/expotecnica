{% extends "admin/layout.html" %}
{% block admin_content %}
<section class="card admin-section maintenance-page">
    <div class="maintenance-banner">
        <div>
            <p class="maintenance-kicker">Identidad institucional</p>
            <h3>Información del colegio</h3>
            <p>Configura nombre, direccion, teléfono, correo y logo para todo el sitio.</p>
        </div>
        <span class="tag ok">Configuración global</span>
    </div>
    <form method="post" action="{{ action_url }}" enctype="multipart/form-data" class="compact-form">
        <input type="hidden" name="next" value="{{ next_url }}">
        <input type="hidden" name="action" value="save_institution">
        <div class="grid-2">
            <label>Nombre del colegio
                <input type="text" name="school_name" value="{{ institution_settings.name }}" required>
            </label>
            <label>Correo institucional
                <input type="email" name="school_email" value="{{ institution_settings.email }}" required>
            </label>
        </div>
        <div class="grid-2">
            <label>Teléfono
                <input type="text" name="school_phone" value="{{ institution_settings.phone }}">
            </label>
            <label>Direccion
                <input type="text" name="school_address" value="{{ institution_settings.address }}">
            </label>
        </div>
        <label>Logo institucional
            {% if institution_settings.logo_path %}
                <img src="{{ url_for('static', filename=institution_settings.logo_path) }}" alt="Logo institucional" class="member-photo" style="display:block;width:110px;height:110px;margin-bottom:0.4rem;">
            {% endif %}
            <input type="file" name="school_logo" accept="image/png,image/jpeg,image/webp,image/gif">
        </label>
        <div class="actions-row">
            <button type="submit">Guardar información</button>
        </div>
    </form>
</section>
{% endblock %}
